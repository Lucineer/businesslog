version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: businesslog-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - app-data:/app/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: alpine:3.19
    container_name: businesslog-db
    command: >
      sh -c "
        apk add --no-cache sqlite &&
        mkdir -p /data &&
        sqlite3 /data/businesslog.db 'SELECT 1;' &&
        echo 'SQLite database ready' &&
        tail -f /dev/null
      "
    volumes:
      - app-data:/data
    networks:
      - internal
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: businesslog-redis
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - internal
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  app-data:
    driver: local
  redis-data:
    driver: local

networks:
  internal:
    driver: bridge
